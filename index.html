<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Cotrisoja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tela Inicial -->
  <div id="screen-start" class="screen active">
    <div class="card">
      <div class="logo-area">
        <img src="assets/2.png" class="logo-img" alt="Logo Cotrisoja">
        <h1>Quiz<br><span>Cotrisoja</span></h1>
      </div>
      <p class="subtitle">Teste seus conhecimentos sobre a Cotrisoja!</p>
      <p class="disclaimer">O tempo de resposta é apenas critério de desempate.</p>
      <div id="already-played" class="already-played" style="display:none">
        <p class="already-played-msg">Você já participou do quiz!</p>
        <button class="btn btn-primary" id="btn-see-classification">Ver Classificação</button>
      </div>
      <form id="form-start">
        <input
          type="text"
          id="input-name"
          placeholder="Digite seu nome"
          required
          autocomplete="off"
          maxlength="40"
        >
        <input
          type="text"
          id="input-surname"
          placeholder="Digite seu sobrenome"
          required
          autocomplete="off"
          maxlength="60"
        >
        <input
          type="tel"
          id="input-phone"
          placeholder="Digite seu telefone"
          required
          autocomplete="tel"
          maxlength="20"
        >
        <button type="submit" class="btn btn-primary" id="btn-start" disabled>
          Começar Quiz
        </button>
      </form>
    </div>
  </div>

  <!-- Tela de Pergunta -->
  <div id="screen-question" class="screen">
    <div class="card">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="question-header">
        <span class="question-counter" id="question-counter">Pergunta 1 de 10</span>
      </div>
      <h2 class="question-text" id="question-text"></h2>
      <div class="options" id="options-container"></div>
    </div>
  </div>

  <!-- Tela de Feedback -->
  <div id="screen-feedback" class="screen">
    <div class="card feedback-card">
      <div class="feedback-icon" id="feedback-icon"></div>
      <h2 id="feedback-title"></h2>
      <p id="feedback-message"></p>
      <button class="btn btn-primary" id="btn-next">Próxima Pergunta</button>
    </div>
  </div>

  <!-- Tela de Resultado Final -->
  <div id="screen-result" class="screen">
    <div class="card result-card">
      <div class="result-icon">🏆</div>
      <h2>Quiz Finalizado!</h2>
      <div class="score-display">
        <span class="score-number" id="score-number">0</span>
        <span class="score-total" id="score-total">/ 0</span>
      </div>
      <p class="score-label">acertos</p>
      <p class="result-message" id="result-message"></p>
      <a href="https://cotrisoja.com.br/historia/" target="_blank" rel="noopener" class="know-more-link">Saiba mais sobre a Cotrisoja</a>
      <div class="answers-summary" id="answers-summary"></div>
      <button class="btn btn-primary" id="btn-restart">Ver Classificação</button>

    </div>
  </div>

  <!-- Tela de Classificação -->
  <div id="screen-classification" class="screen">
    <div class="card classification-card">
      <div class="result-icon">🏅</div>
      <h2>Classificação</h2>
      <div class="classification-list" id="classification-list"></div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
